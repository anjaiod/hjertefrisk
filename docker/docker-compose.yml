services:
  postgres:
    image: postgres:16
    container_name: app_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hjertefriskuser
      POSTGRES_PASSWORD: hjertepass3421
      POSTGRES_DB: hjertefriskdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: